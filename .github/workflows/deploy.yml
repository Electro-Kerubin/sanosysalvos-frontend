name: CI/CD - Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and Push DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generar nginx.conf con IP del backend
        run: |
          cat > nginx.conf <<'EOF'
          server {
              listen 80;

              location / {
                  root /usr/share/nginx/html;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://${{ secrets.EC2_BACK_HOST }}:8080/api/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /actuator/ {
                  proxy_pass http://${{ secrets.EC2_BACK_HOST }}:8080/actuator/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npx expo export:web
        env:
          EXPO_PUBLIC_API_GATEWAY_URL: http://${{ secrets.EC2_FRONT_HOST }}

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sanosysalvos-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.EC2_FRONT_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin

            if ! sudo /usr/bin/docker info &> /dev/null; then
              sudo dnf install -y docker
              sudo systemctl enable --now docker
              sudo usermod -aG docker ec2-user
              sudo systemctl restart docker
            fi

            if ! sudo docker compose version &> /dev/null; then
              COMPOSE_VERSION=$(curl -s https://api.github.com/repos/docker/compose/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            sudo mkdir -p /opt/sanosysalvos/frontend
            sudo chown ec2-user:ec2-user /opt/sanosysalvos/frontend
            cd /opt/sanosysalvos/frontend

            sudo bash -c 'cat > /opt/sanosysalvos/frontend/.env <<EOF
            DOCKERHUB_USERNAME='"${DOCKERHUB_USERNAME}"'
            EOF'

            cat > docker-compose.yml <<'COMPOSE_EOF'
            version: '3.8'
            services:
              frontend:
                image: ${DOCKERHUB_USERNAME}/sanosysalvos-frontend:latest
                container_name: sanosysalvos-frontend
                restart: unless-stopped
                ports:
                  - "80:80"
            COMPOSE_EOF

            sudo docker compose pull frontend
            sudo docker compose up -d --no-deps --force-recreate frontend
            sudo docker image prune -f
